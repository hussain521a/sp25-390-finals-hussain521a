<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>Lab 6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <style>
        .container {
    
        margin: auto;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 10px;
    }
    </style>
  </head>
    <body>
        <form id="userForm" class="container">
            <div class="mb-3">
                <label for="Name">Full Name:</label>
                <input
                    type="text"
                    id="Name"
                    placeholder="Enter your full name"
                    required
                    title="Please enter your full name"
                >
            </div>

            <div class="mb-3">
                <label for="emailAddress">Siena College Email:</label>
                <input
                    type="email"
                    id="emailAddress"
                    placeholder="Enter your Siena email"
                    required
                    pattern=".+@siena\.edu"
                    title="Please enter a valid Siena College email ending with @siena.edu"
                >
            </div>

            <div class="mb-3">
                <label for="message">Type a message:</label>
                <textarea 
                    id="message"
                    placeholder="Type a message"
                    required
                    rows="4" 
                    cols="50"
                    title="Type a message"
                >Type me a nice message here!</textarea>
            </div>
            
            <button type="submit">Submit</button>
        
        </form>
    </body>
</html>

    async function sendToPost() {
        const Name = document.getElementById("Name").value;
        const emailAddress = document.getElementById("emailAddress").value;
        const message = document.getElementById("message").value;
        console.log("Name:", Name);
        console.log("emailAddress:", emailAddress);
        console.log("message:", message);

        try {
            const response = await fetch(
                '/users',
                {
                    method: 'POST',
                    headers: {
                    'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ Name, emailAddress, message })
                }
            );
            const data = await response.json();

            if (!response.ok) {
                throw new Error('Get failed');
            }

            console.log('Get successful!');

        } catch (error) {
            console.log('Error: ' + error.message);
        }
    }
</script>
