<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>Lab 6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <style>
        .container {
    
        margin: auto;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 10px;
    }
    </style>
  </head>
    <body>
        <form id="pokemonForm" class="container">
            <div class="mb-3"></div>
                <label for="Name">Pokemon Name:</label>
                <input
                    type="text"
                    id="Name"
                    placeholder="Enter the pokemon's name"
                    required
                    title="Please enter a pokemon name"
                >
            </div>

            <div class="mb-3"></div>
                <label for="Type">Type:</label>
                <input type="radio" id="water" name="Type" value="water">
                <label for="water">water</label><br>
                <input type="radio" id="fire" name="Type" value="fire">
                <label for="fire">fire</label><br>
                <input type="radio" id="rock" name="Type" value="rock">
                <label for="rock">rock</label>
            </div>

            <div class="mb-3"></div>
            <label for="Attack">Siena ID:</label>
            <input
                type="number"
                id="Attack"
                placeholder="0"
                required
                min="1"
                title="Attack Points"
            >
            </div>
            
            <button type="submit">Submit</button>
        
        </form>
    </body>
</html>
<script>
    document.getElementById("pokemonForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        // const Name = document.getElementById("Name").value;
        // const Type = document.querySelector('input[name="Type"]:checked').value;
        // const Attack = document.getElementById("Attack").value;

        // // Log to console (or do whatever you need with the data)
        // console.log("Form submitted successfully!");
        // console.log("Name:", Name);
        // console.log("Type:", Type);
        // console.log("Attack:", Attack);

        await sendToWebhook()
    });


    async function sendToWebhook() {
        const Name = document.getElementById("Name").value;
        const Type = document.querySelector('input[name="Type"]:checked').value;
        const Attack = document.getElementById("Attack").value;

        try {
            const response = await fetch(
            'https://peaceful-griffin-98.webhook.cool',
            {
                method: 'POST',
                headers: {
                'Content-Type': 'application/json'
                },
                body: JSON.stringify({ Name, Type, Attack })
            }
            );

            if (!response.ok) {
            throw new Error('Webhook request failed');
            }

            console.log('Sent to webhook successfully!');

        } catch (error) {
            console.log('Error: ' + error.message);
        }
    }
</script>
